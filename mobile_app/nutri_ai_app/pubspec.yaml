name: nutri_ai_app
description: Nutri AI Flutter app.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^5.1.0
  google_sign_in: ^6.2.1
  google_sign_in_web: ^0.12.4+4
  http: ^1.2.2
  image_picker: ^1.1.2
  mobile_scanner: ^5.2.3
  provider: ^6.1.2
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
